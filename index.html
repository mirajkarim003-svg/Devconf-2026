<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026 Landing page Design</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>
<body>
     <!-- Navigation Bar -->

    <nav>
        <div><img src="./images/logo.png" alt="Logo"></div>
        <ul class="nav-ul">
            <li>Speaker</li>
            <li>Schedule</li>
            <li>Tracks</li>
            <li>Venue</li>
            <li>Blog</li>
        </ul>
        <button>Register Now</button>
    </nav>
      <!-- Hero Banner -->
     
    <main>
        <section class="hero">
            <h1 class="hero-heading">Code. <em>Connect. </em>Create</h1>
            <p class="hero-text">Join 4,000+ engineers, founders, and builders at the premier developer <br> conference
                of
                2026. Three days of cutting-edge talks, hands-on workshops, <br> and meaningful connections.</p>
            <button class="hero-button">Register Now</button>
        </section>
    </main>

</body>
</html>
